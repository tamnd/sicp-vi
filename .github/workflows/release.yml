name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull build image
        run: docker pull ghcr.io/tamnd/sicp-docker:latest

      - name: Build PDF
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/tamnd/sicp-docker:latest \
            make -C /workspace/src/pdf

      - name: Build epub
        run: |
          touch src/en_US/*.xhtml
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/tamnd/sicp-docker:latest \
            make -C /workspace/src epub

      - name: Package HTML
        run: cd src && zip -r ../sicp-html.zip html/

      - name: Attach assets to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            src/pdf/sicp.pdf \
            sicp.epub \
            sicp-html.zip
        env:
          GH_TOKEN: ${{ github.token }}
