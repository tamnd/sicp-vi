name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: sicp-vi-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build PDF
        run: |
          sed -i 's/Inconsolata LGC/Inconsolata/g' src/pdf/preamble.tex
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            sicp-vi-builder:latest \
            make -C /workspace/src/pdf

      - name: Build epub
        run: |
          touch src/html/*.xhtml
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            sicp-vi-builder:latest \
            make -C /workspace/src epub

      - name: Package HTML
        run: cd src && zip -r ../sicp-html.zip html/

      - name: Attach assets to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            src/pdf/sicp.pdf \
            sicp.epub \
            sicp-html.zip
        env:
          GH_TOKEN: ${{ github.token }}
