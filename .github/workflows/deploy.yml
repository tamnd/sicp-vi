name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_IMAGE: ghcr.io/tamnd/sicp-docker:latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull build image
        run: docker pull ${{ env.BUILD_IMAGE }}

      - name: Build HTML for non-English languages
        # English HTML is pre-built and committed to src/en_US/.
        # Other languages are generated here from their books/ sources.
        run: |
          LANGUAGES=$(grep -v '^\s*#' languages.conf | grep -v '^\s*$')
          for lang in $LANGUAGES; do
            if [ "$lang" = "en_US" ]; then continue; fi
            echo "=== Building HTML: $lang ==="
            docker run --rm \
              -v "${{ github.workspace }}:/workspace" \
              ${{ env.BUILD_IMAGE }} \
              make -C /workspace/src LANG=$lang html
          done

      - name: Add .nojekyll
        run: touch src/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: src

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
