name: Test PDF build

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Language to build (e.g. vi, en_US)'
        required: true
        default: 'vi'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_IMAGE: ghcr.io/tamnd/sicp-docker:latest

jobs:
  test-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull build image
        run: docker pull ${{ env.BUILD_IMAGE }}

      - name: Build PDF
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ${{ env.BUILD_IMAGE }} \
            make -C /workspace/src/pdf LANG=${{ inputs.lang }}

      - name: Upload xelatex log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sicp-${{ inputs.lang }}-tex-debug
          path: |
            src/pdf/sicp-${{ inputs.lang }}.log
            src/pdf/sicp-${{ inputs.lang }}.tex
            src/pdf/sicp-${{ inputs.lang }}-flat.texi
          retention-days: 3

      - name: Build EPUB
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ${{ env.BUILD_IMAGE }} \
            make -C /workspace/src LANG=${{ inputs.lang }} epub

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sicp-${{ inputs.lang }}-pdf
          path: src/pdf/sicp-${{ inputs.lang }}.pdf
          retention-days: 7

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sicp-${{ inputs.lang }}-epub
          path: sicp-${{ inputs.lang }}.epub
          retention-days: 7
